<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARTA BONDA | Shop Lenovo AI</title>
    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk/dist/bundle.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; }
        .call-btn { background-color: #E22718; color: white; border: none; padding: 18px 35px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; width: 100%; }
        .call-btn:hover { background-color: #000; }
        .call-btn:disabled { background-color: #ccc; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
        .logo { font-weight: 900; font-size: 24px; margin-bottom: 10px; }
        .logo span { color: #E22718; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">SHOP <span>LENOVO</span></div>
    <p>Менеджер Олександра готова допомогти вам із замовленням</p>
    <button id="call-button" class="call-btn">Зателефонувати Олександрі</button>
    <div id="status">Завантаження...</div>
</div>

<script>
    let sdk;
    const btn = document.getElementById('call-button');
    const statusText = document.getElementById('status');
    
    // ВСТАВТЕ ВАШ НОВИЙ ТОКЕН СЮДИ
    const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ2aWRlbyI6eyJyb29tSm9pbiI6dHJ1ZSwicm9vbSI6IndlYl9jYWxsXzIyNGUwYjlkMWJmZjFhMjVkNmUwM2QyOWFmYSJ9LCJpc3MiOiJBUEl3UkNGdVBCYXdtMmgiLCJleHAiOjE3NzQ5ODgyNDAsIm5iZiI6MCwic3ViIjoiY2xpZW50In0.TgmLa95_uSf87haN34E99WLFXGAedM0Uq1Kc9wWNz5g";

    // Функція ініціалізації
    function init() {
        try {
            // Перевіряємо, чи завантажилась бібліотека в глобальне вікно
            const RetellClass = window.RetellWebClient || (window.Retell && window.Retell.RetellWebClient);
            
            if (RetellClass) {
                sdk = new RetellClass();
                statusText.innerText = "Готово до тесту";
                console.log("SDK успішно активовано");
            } else {
                statusText.innerText = "Помилка завантаження бібліотеки";
            }
        } catch (e) {
            console.error("Помилка:", e);
        }
    }

    window.onload = () => setTimeout(init, 1000);

    btn.addEventListener('click', async () => {
        if (!sdk) return alert("Зачекайте завантаження");

        if (btn.innerText === "Завершити розмову") {
            sdk.stopCall();
            return;
        }

        try {
            statusText.innerText = "З'єднуємо...";
            btn.disabled = true;

            await sdk.startCall({ accessToken: TOKEN });

            btn.disabled = false;
            btn.innerText = "Завершити розмову";
            btn.style.backgroundColor = "#000";
            statusText.innerText = "Олександра на зв'язку";
        } catch (error) {
            console.error(error);
            statusText.innerText = "Помилка (можливо, токен застарів)";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
