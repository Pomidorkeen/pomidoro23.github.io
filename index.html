<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARTA BONDA | Shop Lenovo AI</title>
    
    <script src="https://unpkg.com/retell-client-js-sdk@latest/dist/bundle.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f8f9fa;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
        }
        .call-btn {
            background-color: #E22718; 
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(226, 39, 24, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }
        .call-btn:hover {
            background-color: #000;
            transform: translateY(-2px);
        }
        .call-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        .logo span { color: #E22718; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">SHOP <span>LENOVO</span></div>
    <p>Менеджер Олександра готова допомогти вам із замовленням</p>
    
    <button id="call-button" class="call-btn">Зателефонувати Олександрі</button>
    <div id="status">Статус: Готово до тесту</div>
</div>

<script type="text/javascript">
  window.helpcrunchSettings = {
    organization: 'shoplenovo',
    appId: '4231759b-b3d0-4136-820f-115a9c0217af',
  };
</script>

<script type="text/javascript">
  (function(w,d){var hS=w.helpcrunchSettings;if(!hS||!hS.organization){return;}var widgetSrc='https://embed.helpcrunch.com/sdk.js';w.HelpCrunch=function(){w.HelpCrunch.q.push(arguments)};w.HelpCrunch.q=[];function r(){if (d.querySelector('script[src="' + widgetSrc + '"')) { return; }var s=d.createElement('script');s.async=1;s.type='text/javascript';s.src=widgetSrc;(d.body||d.head).appendChild(s);}if(d.readyState === 'complete'||hS.loadImmediately){r();} else if(w.attachEvent){w.attachEvent('onload',r)}else{w.addEventListener('load',r,false)}})(window, document)
</script>

<script>
    let sdk;
    
    // Чекаємо повного завантаження сторінки
    window.onload = () => {
        const btn = document.getElementById('call-button');
        const statusText = document.getElementById('status');

        // Ініціалізація SDK з перевіркою глобального об'єкта
        try {
            if (window.Retell) {
                sdk = new window.Retell.RetellWebClient();
            } else if (window.RetellClientJsSdk) {
                sdk = new window.RetellClientJsSdk.RetellWebClient();
            } else {
                throw new Error("SDK not found");
            }
            console.log("Retell SDK ініціалізовано успішно");
        } catch (e) {
            console.error("Помилка ініціалізації SDK:", e);
            statusText.innerText = "Помилка завантаження голосу";
        }

        btn.addEventListener('click', async () => {
            // ВАШ АКТУАЛЬНИЙ ТОКЕН (з вашого скріншоту)
            const TEST_ACCESS_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ2aWRlbyI6eyJyb29tSm9pbiI6dHJ1ZSwicm9vbSI6IndlYl9jYWxsXzA2NmYxNjQ4NjViZTU5NDA5YzBkMTZhYjdmMyJ9LCJpc3MiOiJBUEl3UkNGdVBCYXdtMmgiLCJleHAiOjE3NzQ5ODkwMTYsIm5iZiI6MCwic3ViIjoiY2xpZW50In0.zJW5Y7guhSwQT8AahlAz1oYp5y1EFa2_3feNYDpMaxs"; 

            if (btn.innerText === "Завершити розмову") {
                sdk.stopCall();
                return;
            }

            try {
                statusText.innerText = "З'єднуємо з Олександрою...";
                btn.disabled = true;

                await sdk.startCall({
                    accessToken: TEST_ACCESS_TOKEN,
                });

                btn.disabled = false;
                btn.innerText = "Завершити розмову";
                btn.style.backgroundColor = "#000";
                statusText.innerText = "Розмова триває...";

            } catch (error) {
                console.error("Помилка дзвінка:", error);
                statusText.innerText = "Помилка: перевірте токен або мікрофон";
                btn.disabled = false;
                btn.innerText = "Зателефонувати Олександрі";
            }
        });

        if (sdk) {
            sdk.on('call_ended', () => {
                statusText.innerText = "Дзвінок завершено. Дякуємо!";
                btn.innerText = "Зателефонувати знову";
                btn.style.backgroundColor = "#E22718";
                btn.disabled = false;
            });
            
            sdk.on('error', (err) => {
                console.error("SDK Error:", err);
                statusText.innerText = "Помилка зв'язку.";
                btn.disabled = false;
            });
        }
    };
</script>

</body>
</html>
